name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        run: |
          rustup update nightly
          rustup default nightly

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libpcap-dev libudev-dev \
            libdbus-1-dev libappindicator3-dev libxdo-dev

      - name: Install components
        run: rustup component add rustfmt clippy

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        run: |
          rustup update nightly
          rustup default nightly

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libpcap-dev libudev-dev \
            libdbus-1-dev libappindicator3-dev libxdo-dev

      - name: Build
        run: cargo build --release

      - name: Prepare binary
        run: |
          mkdir -p dist
          cp target/release/conduit dist/conduit-linux-amd64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
