name: CI

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        run: |
          rustup update nightly
          rustup default nightly

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libpcap-dev libudev-dev \
            libdbus-1-dev libappindicator3-dev libxdo-dev

      - name: Install components
        run: rustup component add rustfmt clippy

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        run: |
          rustup update nightly
          rustup default nightly

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libpcap-dev libudev-dev \
            libdbus-1-dev libappindicator3-dev libxdo-dev

      - name: Build
        run: cargo build --release

      - name: Prepare binary
        run: |
          mkdir -p dist
          cp target/release/conduit dist/conduit-linux-amd64

      - name: Extract changelog
        id: changelog
        run: |
          export VER="${GITHUB_REF_NAME#v}"
          python3 -c "
          import re, os
          ver = os.environ['VER']
          c = open('CHANGELOG.md').read()
          pat = rf'## \[{re.escape(ver)}\].*?(?=\n## \[|\Z)'
          m = re.search(pat, c, re.DOTALL)
          if m:
              body = m.group().strip()
              body = '\n'.join(body.split('\n')[1:]).strip()
              body = body.replace('%', '%25').replace('\n', '%0A').replace('\r', '%0D')
              print(f'body={body}')
          " >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          body: '${{ steps.changelog.outputs.body }}'
          files: dist/*
